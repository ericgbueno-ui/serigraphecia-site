name: YouTube Intelligence Sync

on:
  schedule:
    # Roda a cada 15 dias à meia-noite (UTC)
    - cron: '0 0 1,15 * *'
  workflow_dispatch: # Permite que você execute manualmente pelo painel do GitHub a qualquer momento

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 0. Verifica se os secrets obrigatórios estão configurados
      - name: Check required secrets
        run: |
          missing=""
          [ -z "$GOOGLE_GENERATIVE_AI_API_KEY" ] && missing="$missing GOOGLE_GENERATIVE_AI_API_KEY"
          [ -z "$OPENAI_API_KEY" ] && missing="$missing OPENAI_API_KEY"
          [ -z "$DATABASE_URL" ] && missing="$missing DATABASE_URL"
          if [ -n "$missing" ]; then
            echo "❌ Secrets obrigatórios não configurados:$missing"
            echo ""
            echo "Configure-os em: https://github.com/$GITHUB_REPOSITORY/settings/secrets/actions"
            echo "Use o script: bash scripts/setup-github-secrets.sh"
            exit 1
          fi
          echo "✅ Secrets verificados."
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # 1. Faz o checkout do código do repositório
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Configura o Python no runner
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Instala dependências do Python
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install youtube-transcript-api google-generativeai openai

      # 4. Executa a ingestão do YouTube para gerar os novos Markdowns
      - name: Run YouTube Ingestion
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/youtube_ingestor.py

      # 5. Configura o Node.js no runner
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 6. Instala dependências do Node e gera o Prisma Client
      - name: Install Node dependencies
        run: |
          npm ci --legacy-peer-deps || npm install --legacy-peer-deps
          npx prisma generate

      # 7. Executa a sincronização vetorial com o Neon
      - name: Sync Vector Database (RAG)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx tsx prisma/seed-jolie.ts

      # 8. Commita os novos arquivos Markdown gerados de volta ao repositório
      - name: Commit and Push new Markdowns
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ia-jolie-cerebro/
          if git diff --staged --quiet; then
            echo "Nenhum novo arquivo markdown para commitar."
          else
            git commit -m "Auto-sync: YouTube intelligence ingested [skip ci]"
            git push
          fi
