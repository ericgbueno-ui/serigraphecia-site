name: Backup Neon (Branch Snapshot)

on:
  schedule:
    # Todo dia às 02:00 UTC (23:00 Brasília)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo do backup manual'
        required: false
        default: 'Manual'

jobs:
  neon-backup:
    name: Criar branch de backup no Neon
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Verificar NEON_API_KEY
        run: |
          if [ -z "$NEON_API_KEY" ]; then
            echo "❌ NEON_API_KEY não configurado."
            echo "   Acesse: https://github.com/$GITHUB_REPOSITORY/settings/secrets/actions"
            exit 1
          fi
          echo "✅ NEON_API_KEY presente."
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

      - name: Criar branch de backup
        id: create_branch
        run: |
          PROJECT_ID="patient-base-40833129"
          PARENT_BRANCH="br-spring-cell-acuqf2cv"
          DATE=$(date -u +"%Y-%m-%d")
          BRANCH_NAME="backup-${DATE}"

          echo "📦 Criando branch de backup: ${BRANCH_NAME}..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://console.neon.tech/api/v2/projects/${PROJECT_ID}/branches" \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"branch\": {
                \"name\": \"${BRANCH_NAME}\",
                \"parent_id\": \"${PARENT_BRANCH}\"
              },
              \"endpoints\": []
            }")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            BRANCH_ID=$(echo "$BODY" | grep -o '"id":"br-[^"]*"' | head -1 | cut -d'"' -f4)
            echo "✅ Branch criado com sucesso: ${BRANCH_NAME} (${BRANCH_ID})"
            echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT
            echo "branch_id=${BRANCH_ID}" >> $GITHUB_OUTPUT
          else
            # Branch pode já existir (se rodar duas vezes no mesmo dia) — ok
            if echo "$BODY" | grep -q "already exists"; then
              echo "⚠️ Branch ${BRANCH_NAME} já existe. Backup do dia já foi feito."
            else
              echo "❌ Erro ao criar branch: HTTP ${HTTP_CODE}"
              echo "$BODY"
              exit 1
            fi
          fi
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

      - name: Limpar backups antigos (manter últimos 7)
        run: |
          PROJECT_ID="patient-base-40833129"

          echo "🧹 Listando branches de backup..."
          BRANCHES=$(curl -s \
            "https://console.neon.tech/api/v2/projects/${PROJECT_ID}/branches" \
            -H "Authorization: Bearer ${NEON_API_KEY}")

          # Filtra branches que começam com "backup-" e pega os IDs ordenados por data (mais antigos primeiro)
          OLD_BRANCHES=$(echo "$BRANCHES" \
            | grep -o '"name":"backup-[0-9-]*","[^}]*"id":"[^"]*"' \
            | grep -o '"id":"[^"]*"' \
            | cut -d'"' -f4 \
            | head -n -7)

          if [ -z "$OLD_BRANCHES" ]; then
            echo "✅ Nenhum backup antigo para remover (≤ 7 backups)."
          else
            echo "🗑 Removendo branches antigos..."
            for BRANCH_ID in $OLD_BRANCHES; do
              curl -s -X DELETE \
                "https://console.neon.tech/api/v2/projects/${PROJECT_ID}/branches/${BRANCH_ID}" \
                -H "Authorization: Bearer ${NEON_API_KEY}" > /dev/null
              echo "  ✓ Removido: ${BRANCH_ID}"
            done
          fi
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

      - name: Resumo
        run: |
          echo "### ✅ Backup Neon concluído" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Projeto | patient-base-40833129 |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ steps.create_branch.outputs.branch_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ID | \`${{ steps.create_branch.outputs.branch_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Retenção | 7 dias (últimos 7 branches mantidos) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Para restaurar: acesse [Neon Console](https://console.neon.tech/app/org-misty-rain-93515565/projects/patient-base-40833129/branches) e faça merge do branch de backup para o main." >> $GITHUB_STEP_SUMMARY
