name: Backup Banco de Dados

on:
  schedule:
    # Todo dia às 03:00 UTC (00:00 Brasília)
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo do backup manual'
        required: false
        default: 'Manual'

jobs:
  backup:
    name: pg_dump → Artifact + S3
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ─── 1. Verifica secrets obrigatórios ────────────────────────────────────
      - name: Verificar DATABASE_URL
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "❌ DATABASE_URL não configurado nos GitHub Secrets."
            echo "   Acesse: https://github.com/$GITHUB_REPOSITORY/settings/secrets/actions"
            exit 1
          fi
          echo "✅ DATABASE_URL presente."
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # ─── 2. Instala cliente PostgreSQL ───────────────────────────────────────
      - name: Instalar postgresql-client-17
        run: |
          sudo apt-get install -y curl gnupg lsb-release
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17

      # ─── 3. Executa pg_dump ──────────────────────────────────────────────────
      - name: Gerar dump SQL
        id: dump
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d_%H-%M-%S")
          FILENAME="multitrip_backup_${TIMESTAMP}.sql"
          FILEPATH="/tmp/${FILENAME}"

          # Usa URL não-pooled se disponível; remove params incompatíveis com pg_dump antigo
          RAW="${DATABASE_URL_UNPOOLED:-$DATABASE_URL}"
          # Strip query string — pg_dump com SSL funciona sem ?sslmode na URL quando PGSSLMODE está setado
          CONN=$(echo "$RAW" | sed 's/?.*//')
          export PGSSLMODE=require

          # Usa pg_dump 17 explicitamente (evita conflito com pg16 default no PATH)
          PG_DUMP=$(find /usr/lib/postgresql/17/bin /usr/bin -name "pg_dump" 2>/dev/null | head -1)
          echo "📦 Iniciando pg_dump em ${TIMESTAMP}... (usando: $PG_DUMP)"
          "$PG_DUMP" \
            --format=plain \
            --no-owner \
            --no-privileges \
            --no-comments \
            --dbname="$CONN" \
            --file="$FILEPATH"

          gzip "$FILEPATH"
          FILEPATH_GZ="${FILEPATH}.gz"
          SIZE=$(du -sh "$FILEPATH_GZ" | cut -f1)
          echo "✅ Dump concluído: ${FILENAME}.gz (${SIZE})"

          echo "filename=${FILENAME}.gz" >> $GITHUB_OUTPUT
          echo "filepath=${FILEPATH_GZ}" >> $GITHUB_OUTPUT
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "size=${SIZE}" >> $GITHUB_OUTPUT

      # ─── 4. Salva como GitHub Artifact (sempre) ──────────────────────────────
      - name: Upload para GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.dump.outputs.filename }}
          path: ${{ steps.dump.outputs.filepath }}
          retention-days: 90
          if-no-files-found: error

      # ─── 5. Upload para S3 / Cloudflare R2 (opcional) ────────────────────────
      - name: Upload para S3 (se configurado)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'sa-east-1' }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
          S3_BACKUP_BUCKET: ${{ secrets.S3_BACKUP_BUCKET }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$S3_BACKUP_BUCKET" ]; then
            echo "⏭ S3 não configurado — pulando upload."
            exit 0
          fi
          echo "☁️ Enviando para S3: s3://$S3_BACKUP_BUCKET/backups/${{ steps.dump.outputs.filename }}"
          aws s3 cp "${{ steps.dump.outputs.filepath }}" \
            "s3://${S3_BACKUP_BUCKET}/backups/${{ steps.dump.outputs.filename }}" \
            --storage-class STANDARD_IA

          echo "🧹 Limpando backups antigos no S3..."
          aws s3 ls "s3://${S3_BACKUP_BUCKET}/backups/" \
            | sort -k1,2 \
            | head -n -30 \
            | awk '{print $4}' \
            | xargs -I{} aws s3 rm "s3://${S3_BACKUP_BUCKET}/backups/{}" || true

          echo "✅ Upload S3 concluído."

      # ─── 6. Verifica integridade do dump ─────────────────────────────────────
      - name: Verificar integridade
        run: |
          FILE="${{ steps.dump.outputs.filepath }}"
          # Verifica que o gzip não está corrompido
          if ! gzip -t "$FILE"; then
            echo "❌ Arquivo corrompido!"
            exit 1
          fi
          # Verifica que contém dados reais (deve ter INSERT ou COPY)
          if ! zcat "$FILE" | grep -q -E "^(INSERT|COPY|CREATE TABLE)"; then
            echo "⚠️ Aviso: dump parece estar vazio ou sem dados!"
            exit 1
          fi
          echo "✅ Integridade verificada. Tamanho: ${{ steps.dump.outputs.size }}"

      # ─── 7. Resumo final ─────────────────────────────────────────────────────
      - name: Resumo do backup
        run: |
          echo "### ✅ Backup concluído" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Arquivo | \`${{ steps.dump.outputs.filename }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tamanho | ${{ steps.dump.outputs.size }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | ${{ steps.dump.outputs.timestamp }} UTC |" >> $GITHUB_STEP_SUMMARY
          echo "| Retenção GitHub | 90 dias |" >> $GITHUB_STEP_SUMMARY
