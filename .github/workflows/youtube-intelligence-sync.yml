name: YouTube Intelligence Sync

on:
  schedule:
      # Roda a cada 15 dias à meia-noite (UTC)
          - cron: '0 0 1,15 * *'
            workflow_dispatch: # Permite executar manualmente pelo painel do GitHub a qualquer momento

            jobs:
              sync:
                  runs-on: ubuntu-latest
                      steps:
                            - name: Checkout repository
                                    uses: actions/checkout@v4
                                            with:
                                                      token: ${{ secrets.GITHUB_TOKEN }}

                                                            - name: Set up Python
                                                                    uses: actions/setup-python@v5
                                                                            with:
                                                                                      python-version: '3.11'

                                                                                            - name: Install Python dependencies
                                                                                                    run: |
                                                                                                              python -m pip install --upgrade pip
                                                                                                                        pip install youtube-transcript-api google-generativeai openai
                                                                                                                        
                                                                                                                              - name: Run YouTube Ingestion
                                                                                                                                      env:
                                                                                                                                                GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
                                                                                                                                                          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                                                                                                                                                                  run: python scripts/youtube_ingestor.py
                                                                                                                                                                  
                                                                                                                                                                        - name: Set up Node.js
                                                                                                                                                                                uses: actions/setup-node@v4
                                                                                                                                                                                        with:
                                                                                                                                                                                                  node-version: '20'
                                                                                                                                                                                                            cache: 'npm'
                                                                                                                                                                                                            
                                                                                                                                                                                                                  - name: Install Node dependencies
                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                    npm ci --legacy-peer-deps || npm install --legacy-peer-deps
                                                                                                                                                                                                                                              npx prisma generate
                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                    - name: Sync Vector Database (RAG)
                                                                                                                                                                                                                                                            env:
                                                                                                                                                                                                                                                                      DATABASE_URL: ${{ secrets.DATABASE_URL }}
                                                                                                                                                                                                                                                                                OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                                                                                                                                                                                                                                                                                        run: npx tsx prisma/seed-jolie.ts
                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                              - name: Commit and Push new Markdowns
                                                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                                                git config --global user.name "github-actions[bot]"
                                                                                                                                                                                                                                                                                                                          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                                                                                                                    git add ia-jolie-cerebro/
                                                                                                                                                                                                                                                                                                                                              if git diff --staged --quiet; then
                                                                                                                                                                                                                                                                                                                                                          echo "Nenhum novo arquivo markdown para commitar."
                                                                                                                                                                                                                                                                                                                                                                    else
                                                                                                                                                                                                                                                                                                                                                                                git commit -m "Auto-sync: YouTube intelligence ingested [skip ci]"
                                                                                                                                                                                                                                                                                                                                                                                            git push
                                                                                                                                                                                                                                                                                                                                                                                                      fi
